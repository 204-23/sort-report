<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>插入排序範例</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Microsoft JhengHei', '微軟正黑體', Arial, sans-serif;
      background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: white;
      border-radius: 10px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
      overflow: hidden;
    }

    header {
      background: linear-gradient(135deg, #ffe5ec 0%, #fff4f7 100%);
      color: #553f48;
      padding: 30px;
      text-align: center;
    }

    header h1 {
      font-size: 2.5em;
      margin-bottom: 10px;
    }

    header p {
      font-size: 1.1em;
      opacity: 0.9;
    }

    .content {
      padding: 30px;
    }

    .section {
      background: #fff8fb;
      padding: 20px;
      border-radius: 8px;
      border-left: 4px solid #ffd6df;
      margin-bottom: 20px;
    }

    .section h3 {
      color: #ffb8c4;
      margin-bottom: 15px;
      font-size: 1.5em;
    }

    .section p {
      line-height: 1.8;
      color: #333;
      margin-bottom: 10px;
    }

    input[type=text] {
      width: 60%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 5px;
      font-size: 1em;
    }

    button {
      padding: 10px 15px;
      margin-left: 10px;
      background: linear-gradient(135deg, #ffe6ec 0%, #fff4f7 100%);
      color: #553f48;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 1em;
      transition: background 0.3s;
    }

    button:hover {
      background: linear-gradient(135deg, #fff0f4 0%, #fff8fb 100%);
    }

    pre {
      background: #f6f8fa;
      padding: 15px;
      border-radius: 6px;
      font-family: 'Courier New', monospace;
      line-height: 1.6;
      overflow-x: auto;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>插入排序 (Insertion Sort)</h1>
      <p>輸入由逗號或空白分隔的整數，按 <strong>排序</strong>。</p>
    </header>

    <div class="content">
      <div class="section">
        <h3>輸入資料</h3>
        <p>請輸入要排序的數字：</p>
        <div>
          <input id="arrInput" type="text" value="64,25,12,22,11">
          <button id="sortBtn">排序</button>
          <button id="sampleBtn">載入範例</button>
        </div>
      </div>

      <div class="section">
        <h3>結果</h3>
        <p>原始陣列: <span id="before">[64,25,12,22,11]</span></p>
        <p>排序後: <span id="after">[]</span></p>
      </div>

      <div class="section">
        <h3>步驟（插入排序過程）</h3>
        <pre id="steps">（按「排序」查看步驟）</pre>
      </div>
    </div>
  </div>

  <script>
    function parseInput(s){
      return s.split(/[,\s]+/).filter(Boolean).map(x=>Number(x));
    }

    function insertionSort(arr){
      const a = arr.slice();
      const steps = [];
      const n = a.length;
      for(let i=1;i<n;i++){
        let key = a[i];
        let j = i - 1;
        steps.push(`插入元素 ${key}，比較位置 ${i}`);
        while(j >= 0 && a[j] > key){
          a[j+1] = a[j];
          j--;
          steps.push(`移動 ${a[j+1]} 到位置 ${j+2}`);
        }
        a[j+1] = key;
        steps.push(`放置 ${key} 到位置 ${j+1}，目前陣列: [${a.join(', ')}]`);
      }
      return {sorted: a, steps: steps};
    }

    document.getElementById('sortBtn').addEventListener('click', function(){
      const input = document.getElementById('arrInput').value;
      const arr = parseInput(input);
      document.getElementById('before').textContent = '[' + arr.join(', ') + ']';
      const result = insertionSort(arr);
      document.getElementById('after').textContent = '[' + result.sorted.join(', ') + ']';
      document.getElementById('steps').textContent = result.steps.join('\n');
    });

    document.getElementById('sampleBtn').addEventListener('click', function(){
      document.getElementById('arrInput').value = '64,25,12,22,11';
    });
  </script>
</body>
</html>
